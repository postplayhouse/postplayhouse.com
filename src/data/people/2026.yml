      - Choreographer
  roles:
    Seussical:
      - Cat in the Hat
    Oklahoma!:
      - Will Parker
    Grease:
      - Kenickie
  bio: |
    Grant Newcombe is an upcoming senior at FSU studying BA Theater (Performance) with a voice music minor. He is so excited to be returning to Post Playhouse for his second summer! His most recent credits include *Footloose* (Chuck), *Newsies* (Race/co-choreographer), *Guys and Dolls* (Lieutenant Brannigan), *Once Upon a Mattress* (Jester), and *Spring Awakening* (Hanschen). He has also recently directed and choreographed a dance piece to Billie Eilish's album, *Hit Me Hard and Soft*. Lastly, he is so grateful for his friends and family's endless support, and for Post Playhouse welcoming him back as an actor and choreographer! [@newcombegrant](https://www.instagram.com/newcombegrant)

