  bio: |
    Rhett can't express how thrilled he is to be back for this 3rd season at Post as scenic designer and now lighting designer! He has been a part of countless productions mainly in the Western Maryland area both onstage and off, most notable at The Cumberland Theatre, and MET in Frederick MD.  He has scenic designed over 70 productions and light designed over 50 in the last 10 years.  Some of his more notable designs include: *SIX!*, *The Shark is Broken*, *The Play That Goes Wrong*, *The Exorcist*, *The SpongeBob Musical*, *Jersey Boys*, *Murder on the Orient Express*, *Noises Off!*, *Fool for Love*, *Gypsy*, *Carrie The Musical*, *Yankee Tavern*, *Meteor Shower*, *A Streetcar Named Desire*, *The Cake*, *True West*, *Company*, *August: Osage County*, *The Wisdom of Eve*, *Escape to Margaritaville*, *Evil Dead: The Musical*, *The Prom*, *Jersey Boys*, *The Outsiders*, *Nevermore*, *Assassins*, *The Last Five Years*, *House of Yes*, and *Rock of Ages* to name a few.

