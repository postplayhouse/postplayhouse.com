      - Choreographer
  bio: |
    Timothy Ellis is a professor of musical theatre at Kennesaw State University in Georgia. He has directed or choreographed productions of *She Loves Me, Pippin, Reefer Madness, Spitfire Grill, West Side Story, Camelot, Company, RENT, The SpongeBob Musical*, *Bring It On!, The Rocky Horror Show,* *A Chorus Line* and more!  Timothy appeared in *Annie Get Your Gun* starring Bernadette Peters on Broadway; the national tours of *Show Boat* and *Best Little…in Texas;* a European tour of *Evita* as Magaldi; and regionally at Goodspeed Opera House, Atlanta Lyric Theatre, City Springs Theatre, Flat Rock Playhouse, Arvada Center, Tennessee Repertory, Orlando Shakespeare, Cleveland Playhouse, Maltz Jupiter Theatre, Seaside Music Theatre, and Alhambra Theatre.  He is so excited to join the team at the Post Playhouse this summer! [www.timothyellis.com](https://www.timothyellis.com)

