- last_name: Perryman
  first_name: Carter
  image_year: 2026
  location: "Chattanooga, TN"
  production_positions:
    Seussical:
      - Music Director
    Oklahoma!:
      - Music Director
    Grease:
      - Music Director
    Dirty Rotten Scoundrels:
      - Keyboard 2
  program_bio: |
    Carter is excited to be joining the Post Playhouse for his first season. He is currently pursuing a B.M. in Musical Theatre Accompanying at Shenandoah University. In addition to accompanying and music direction, Carter is also a skilled arranger, orchestrator, music copyist, keyboard programmer, organist, accordionist, and drummer. At Shenandoah Conservatory, he has had the privilege of working on *Catch Me If You Can*, *The 25th Annual Putnam County Spelling Bee*, *On The Town*, *Waitress* (Collegiate Premiere), *Legally Blonde.* Last summer he was the Music Direction Apprentice at Theatre Aspen, where he worked on *Mamma Mia!* and was Music Director for the Cabaret *Come Together: A Celebration of the Beatles*. Carter would like to thank his friends and family for their continued support.

    [www.carterperrymanmusic.com](https://www.carterperrymanmusic.com)
  bio: |
    Carter is excited to be joining the Post Playhouse for his first season. He is currently pursuing a Bachelor of Music in Musical Theatre Accompanying at Shenandoah University. In addition to accompanying and music direction, Carter is also a skilled arranger, orchestrator, music copyist and keyboard programmer, and plays organ, accordion, and drums. At Shenandoah Conservatory, he has had the privilege of working on *Catch Me If You Can*, *The 25th Annual Putnam County Spelling Bee*, *On The Town*, *Spamalot*, *Waitress* (Collegiate Premiere), *Legally Blonde,* and *Pippin.* Last summer he was the Music Direction Apprentice at Theatre Aspen in Aspen, Colorado. There he worked on *Mamma Mia!* and was Music Director for the Cabaret *Come Together: A Celebration of the Beatles*. Carter has also worked on professional, community, and educational productions such as *Tick, Tick… Boom!*, *Fiddler On The Roof*, *The Drowsy Chaperone*, *9 to 5*, *Something Rotten!*, *Godspell*, *You're A Good Man Charlie Brown*, *Theory of Relativity*, *Chicago* and many others. Carter also composed the score for the film *The Prowl,* directed by Cole Knight. His score earned him a Nomination for Best Score at the Virginia Emerging Filmmakers Festival in 2025. Carter would like to thank his friends and family for their continued support.

    [www.carterperrymanmusic.com](https://www.carterperrymanmusic.com)

