  bio: |
    Nikki Himes is excited to be joining Post Playhouse for the first time this summer! She is currently a student at FSU where she is pursuing a degree in BA Theatre with a focus in Stage Management and Design/Production. Some of her FSU credits include *You on the Moors Now* (DSM), *Footloose* (DSM), *Soualichi* (SM), and *The Play That Goes Wrong* (First Hand). Other credits include *Joseph* (Costumer), *Songs For A New World* (ASM), and *The Grown-Ups* (SM). She thanks all cast, crew, and production members for being a part of her first summer stock experience. Enjoy the season!
