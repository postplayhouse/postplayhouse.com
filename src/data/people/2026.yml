# start __19__
- last_name: Phillips
  first_name: Zane
  image_year: 2026
  location: "Howell, MI"
  staff_positions:
    - Sound Designer/Engineer
  bio: |
    Zane Phillips is exhilarated to be joining Post Playhouse as the Sound Designer/Engineer through the vast array of fun musicals! He is currently a student at Eastern Michigan University studying both Entertainment Design & Technology and Communication and he is a member of Alpha Psi Omega, Players at EMU, and Eagle Filmmaker's Association. Outside of academics he is a member of USITT and SETC. Zane is highly involved with entertainment productions with credits of EMU Theatre: *Our Town* (ALD), *MT Cabaret '26* (Sound Engineer), *Proof* (Sound Lead/Programmer), *Dance Concert '26* (Student LD). Community Theatre of Howell: *The Aristocats KIDS* (TD/LD/SND), *Next to Normal* (ALD). The Encore: *Frozen* (Run Crew), *West Side Story* (Mic Tech), and *42nd Street* (Spot). Love to all supporting his theatre journey! Website: [zoptheatre.weebly.com](https://zoptheatre.weebly.com)

# end __19__
# start __20__
- last_name: Wolford
  first_name: Rhett
  image_year: 2026
  location: "Cumberland, MD"
  staff_positions:
    - Scenic
    - Lighting and Media Designer for all productions
  bio: |
    Rhett can't express how thrilled he is to be back for this 3rd season at Post as scenic designer and now lighting designer! He has been a part of countless productions mainly in the Western Maryland area both onstage and off, most notable at The Cumberland Theatre, and MET in Frederick MD.  He has scenic designed over 70 productions and light designed over 50 in the last 10 years.  Some of his more notable designs include: *SIX!*, *The Shark is Broken*, *The Play That Goes Wrong*, *The Exorcist*, *The SpongeBob Musical*, *Jersey Boys*, *Murder on the Orient Express*, *Noises Off!*, *Fool for Love*, *Gypsy*, *Carrie The Musical*, *Yankee Tavern*, *Meteor Shower*, *A Streetcar Named Desire*, *The Cake*, *True West*, *Company*, *August: Osage County*, *The Wisdom of Eve*, *Escape to Margaritaville*, *Evil Dead: The Musical*, *The Prom*, *Jersey Boys*, *The Outsiders*, *Nevermore*, *Assassins*, *The Last Five Years*, *House of Yes*, and *Rock of Ages* to name a few.

