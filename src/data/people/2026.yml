# start __3__
- last_name: Denton
  first_name: Don
  image_year: 2019
  location: "Chattanooga, TN"
  staff_positions:
    - General IT
  bio: |
    Don has been working with Post Playhouse in some capacity since 2008. A lot has changed since that first season. He married the lovely actress who played opposite him in _South Pacific_, they had three crazy, adorable children, and they moved to Chattanooga. Lately, Don has been providing Post Playhouse with IT support, and he is happy to be able to continue to help the theatre in this way.
# end __3__
# start __2__
- last_name: Galvan
  first_name: Brooke
  image_year: 2022
  location: "Grand Blanc, MI"
  staff_positions:
    - Marketing and Box Office Specialist
  bio: |
    Brooke truly loves being a part of the joy that is Post Playhouse. Though she currently spends her days behind a computer, crafting social media posts and ensuring the ticketing system does its job, she fondly remembers her days on the stage. It’s an honor to support the incredible talent at Post from afar— the beautiful, lake-filled Michigan. Brooke’s other passions include her two wonderful sons, her loving husband, and her ever-expanding career as an author and playwright.
# end __2__
# start __1__
- last_name: Laudeman
  first_name: Em
  image_year: 2022
  location: "Cleveland, OH"
  groups:
    - staff
  staff_positions:
    - Development Director
  bio: |
    Em is delighted to be part of the team at Post again this year. Em worked as an actress at Post Playhouse for four seasons spanning from 2009–2019 before joining the administrative team. She received her BFA in music theatre from Elon University and her MPA in nonprofit management from Indiana University. Em has worked in administration and advancement for arts organizations around the country since 2015, most notably The Cleveland Orchestra and the San Diego Symphony. You may remember Em on the Post Playhouse stage in _The Wizard of Oz_ ‘10 (Dorothy), _Oklahoma!_ ‘12 (Laurie), and _The Music Man_ ‘19 (Marian). She looks forward to visiting her home away from home in Nebraska again this year.
# end __1__
# start __4__
- last_name: Stephens
  first_name: Ann
  image_year: 2020
  location: "Crawford, NE"
  groups:
    - staff
  staff_positions:
    - Off-Season Box Office Manager
  bio: |
    Ann Stephens has worked as part of the Post Playhouse for many summers, first as a volunteer usher, a volunteer in the concession stand, and for the past several years, she has managed the Box Office. Before retirement, Ann had a long and rewarding career as a classroom teacher and as a public education administrator, working in Texas, Arizona, Idaho and Nebraska before joining Post Playhouse staff. In off-season months, Ann enjoys being with her grandchildren, reading, baking, and volunteering throughout her home community of Crawford. Whether you are ready to make additional reservations for more of our superb productions or ready to enjoy some treats at intermission, you’re likely to see Ann... and she’s USUALLY smiling.
# end __4__
# start __5__
- last_name: Barrett
  first_name: Dewayne
  image_year: 2022
  location: "Sarasota, FL"
  staff_positions:
    - Artistic Director
  production_positions:
    Oklahoma!:
      - Director/Choreographer
    Grease:
      - Director/Choreographer
  program_bio: |
    Dewayne had his first season in 2016 and immediately fell in love with the theatre, the region, and the people. In 2017, he became Associate Artistic Director, as well as directing and choreographing several productions. Now he is excited to be the Artistic Director now going on his 10th year with Post Playhouse. He is originally from Georgia, where he danced with the Georgia Ballet and the Atlanta Jazz Theatre. Dewayne has performed leading roles around the country, appearing in *Cats*, *Crazy for You*, *Annie*, *West Side Story*, *A Chorus Line* & *Singing in the Rain*. He has directed and choreographed national tours, regional theaters, cruise ships, dinner theaters, community theatres, movies, parades, High schools and internationally at the Central Academy of Drama in China.
  bio: |
    Dewayne had his first season in 2016 and immediately fell in love with the theatre, the region, and the people. In 2017, he became Associate Artistic Director, as well as directing and choreographing several productions. Now he is excited to be the Artistic Director now going on his 10th year with Post Playhouse. He is originally from Georgia, where he danced with the Georgia Ballet and the Atlanta Jazz Theatre. Dewayne has performed leading roles around the country, appearing in *Cats*, *Crazy for You*, *Annie*, *West Side Story*, *A Chorus Line* & *Singing in the Rain*. He has directed and choreographed national tours, regional theaters, cruise ships, dinner theaters, community theatres, movies, parades, High schools and internationally at the Central Academy of Drama in Beijing, China. He is also choreographer for Rand Productions where he choreographed, *Grease*, *Footloose*, *Elf*, *A Christmas Story* and *Finding Christmas* at the MGM Beau Rivage.
# end __5__
# start __6__
- last_name: Shell
  first_name: Connie
  image_year: 2025
  location: "Crawford, NE"
  staff_positions:
    - Box Office Staff
  bio: |
    After several summers in the box office, Connie is very excited to return for another season. She loves working at Post Playhouse; interacting with cast and crew, seeing plays, and meeting so many interesting people. Before working in the box office, Connie volunteered as an usher for several years. Before retiring, she had a career as both an Administrative Assistant and Legal Secretary in Virginia, Maine, and Nebraska. Being married to a career military man, she was lucky enough to live in California, Virginia, Maine, Alabama, and Japan. Connie has two children and three grandsons. In her off time she enjoys spending time with family, reading, volunteering, and, of course, playing with her cat. Connie looks forward to seeing all of you again this summer.
