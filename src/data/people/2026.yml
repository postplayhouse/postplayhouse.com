  bio: |
    Zane Phillips is exhilarated to be joining Post Playhouse as the Sound Designer/Engineer through the vast array of fun musicals! He is currently a student at Eastern Michigan University studying both Entertainment Design & Technology and Communication and he is a member of Alpha Psi Omega, Players at EMU, and Eagle Filmmaker's Association. Outside of academics he is a member of USITT and SETC. Zane is highly involved with entertainment productions with credits of EMU Theatre: *Our Town* (ALD), *MT Cabaret '26* (Sound Engineer), *Proof* (Sound Lead/Programmer), *Dance Concert '26* (Student LD). Community Theatre of Howell: *The Aristocats KIDS* (TD/LD/SND), *Next to Normal* (ALD). The Encore: *Frozen* (Run Crew), *West Side Story* (Mic Tech), and *42nd Street* (Spot). Love to all supporting his theatre journey! Website: [zoptheatre.weebly.com](https://zoptheatre.weebly.com)

